<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/headshot.jpeg" type="image/jpeg">
  <title>Essays by Samuel Schapiro</title>
  <style>
    /* Google Fonts Import */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap');

    /* General Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Body Styling */
    body {
      font-family: 'Lora', serif;
      background-color: #121212;
      color: #eaeaea;
      line-height: 1.6;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: #f5f5f5;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    header p {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      color: #aaaaaa;
      max-width: 700px;
      margin: 10px auto;
    }

    /* Essays Grid (similar to Bookshelf Grid) */
    .essays-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    /* Essay Card Styling (similar to Book Card) */
    .essay-card {
      display: flex;
      flex-direction: column;
      background-color: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      font-family: 'Lora', serif;
      overflow: hidden;
    }
    
    .essay-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
    }
    
    .essay-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: #f5f5f5;
      margin-bottom: 5px;
      font-weight: 600;
    }
    
    .essay-card p {
      font-family: 'Lora', serif;
      font-size: 1rem;
      color: #bdbdbd;
      margin: 5px 0;
    }
    
    .essay-card a {
      color: #f5f5f5;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .essay-card a:hover {
      color: #F08679;
    }
  </style>
</head>
<body>
  <header>
    <h1>Essays</h1>
    <p>Read my latest essays from Substack</p>
  </header>
  <div class="essays-grid" id="essays-grid">
    <!-- Essay cards will be dynamically inserted here -->
  </div>

  <script>
    // Use your own server-side proxy (proxy.php) to fetch the Substack feed
    fetch('proxy.php')
      .then(response => response.text())
      .then(str => {
        const parser = new DOMParser();
        const xml = parser.parseFromString(str, "application/xml");
        const items = xml.querySelectorAll("item");
        const grid = document.getElementById("essays-grid");

        if (!items.length) {
          grid.innerHTML = "<p>No posts found. Please check your Substack feed.</p>";
          return;
        }

        items.forEach(item => {
          const titleElem = item.querySelector("title");
          const linkElem = item.querySelector("link");
          const pubDateElem = item.querySelector("pubDate");
          const descElem = item.querySelector("description");

          const title = titleElem ? titleElem.textContent : "No title";
          const link = linkElem ? linkElem.textContent : "#";
          const pubDate = pubDateElem ? new Date(pubDateElem.textContent).toLocaleDateString() : "";
          const description = descElem ? descElem.textContent : "";

          // Create the essay card
          const card = document.createElement("div");
          card.classList.add("essay-card");

          // Title as clickable link
          const h3 = document.createElement("h3");
          const a = document.createElement("a");
          a.href = link;
          a.target = "_blank";
          a.textContent = title;
          h3.appendChild(a);

          // Publication date
          const pDate = document.createElement("p");
          if (pubDate) {
            pDate.textContent = pubDate;
          }

          // Essay excerpt/description
          const pDesc = document.createElement("p");
          pDesc.innerHTML = description;

          card.appendChild(h3);
          if (pubDate) card.appendChild(pDate);
          card.appendChild(pDesc);

          grid.appendChild(card);
        });
      })
      .catch(err => {
        console.error("Error fetching or parsing feed:", err);
        document.getElementById("essays-grid").innerHTML = "<p>Error loading posts.</p>";
      });
  </script>
</body>
</html>
