project:
  type: website
  output-dir: docs
  # The creative-ai-index static export is committed directly to
  # docs/creative-ai-index/ and is preserved across renders. We don't list
  # it as a resource because copying 495 files makes every render take 60s+.
  resources:
    - .nojekyll

# Meta
description-meta: "Website"
author-meta: "Samuel Schapiro"

website:
  title: "Samuel Schapiro"
  image: "files/images/headshot.png"
  description: "Personal Website"
 
  page-navigation: true

  page-footer:
    left: "[Samuel Schapiro](http://www.github.com) &copy; <script>document.write(new Date().getFullYear())</script>"
    center: ""
    right:
      - icon: github
        href: https://github.com/samjschapiro
        target: _blank

  search: false

  reader-mode: false

  draft-mode: unlinked
  
  repo-url: https://github.com/drganghe/quarto-academic-website-template
#  repo-actions: [edit, issue, source]
  
  open-graph: true
  
  twitter-card: true 
#  card-style: summary      
  
  site-url: "https://drganghe.github.io/quarto-academic-website-template"
  
  google-analytics:
    tracking-id: ""  # Please delete or replace with your own tracking ID
    anonymize-ip: true 

bibliography: references.bib  # Add references.bib to the root folder to enable the bibliography function

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    footnotes-hover: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    fig-align: center
    link-external-icon: false
    link-external-newwindow: true
    email-obfuscation: javascript
    link-external-filter: '^(?:http:|https:)\/\/drganghe\.github\.io\/custom'
    include-in-header: "files/includes/_academic.qmd"

